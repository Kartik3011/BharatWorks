<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    /> 
    <style>
      * {
        padding: 0;
        margin: 0px;
        font-family: "Roboto", sans-serif;
      }
    </style>
    <title>BharatWorks</title>
    <link rel="icon" href="favicon-32x32.png" type="image/png">
    <style>
      .chat-container {
  position: fixed;
  bottom: 20px; 
  right: 20px;  /* Moved from the edge */
  width: 350px;
  height: 430px;
  background-color: #f9f9f9; 
  border-radius: 20px; 
  overflow: hidden; 
  

  border: 5px solid white;       
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); /* Strong shadow to pop against the background */
  transition: transform 0.3s ease; 
  z-index: 9999;                 
}

/* Optional: Make it grow slightly when hovered */
.chat-container:hover {
  transform: scale(1.05);
}
  
      df-messenger {
        width: 100%;
        height: 100%;
        border-radius: 20px; 
      }
    </style>
  
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '66e4750803dc1207729d8d27' },
              url: 'https://general-runtime.voiceflow.com/',
              versionID: 'production'
            });
          }
          v.src = "https://cdn.voiceflow.com/widget/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');
    </script>
<df-messenger
  intent="WELCOME"
  chat-title="Saarthi-chatbot"
 
  language-code="en"
></df-messenger>
  </body>
</head>
</html>
